<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slam Jam</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #fdfdfd;
    display: flex;
    flex-direction: column;
  }
  .frame {
    flex: 1;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    padding: 8vw;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  img {
    width: 100%;
    height: auto;
    display: block;
  }
  footer {
    padding: 24px 32px;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-size: 13px;
    letter-spacing: 0.02em;
    color: #1a1a1a;
    text-align: left;
  }
  footer a {
    color: #1a1a1a;
    text-decoration: none;
  }
  footer a:hover {
    text-decoration: underline;
  }
  footer div {
    line-height: 1.6;
  }
</style>
</head>
<body>
  <div class="frame">
    <img src="https://cdn.shopify.com/s/files/1/0576/7705/4136/files/FONDAZIONE_IG__3.png?v=1782936810" alt="Slam Jam logo">
  </div>
  <footer>
    <div><a href="https://instagram.com/fondazioneslamjam" target="_blank" rel="noopener">ig: @fondazioneslamjam</a></div>
    <div><a href="mailto:info@fondazioneslamjam.org">mail: info@fondazioneslamjam.org</a></div>
  </footer>
</body>
</html>
