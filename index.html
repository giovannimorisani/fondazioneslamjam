<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fondazione Slam Jam</title>
<link rel="icon" type="image/png" href="https://cdn.shopify.com/s/files/1/0576/7705/4136/files/FONDAZIONE_web_black.png?v=1784283359">
<link rel="preload" as="image" href="https://cdn.shopify.com/s/files/1/0576/7705/4136/files/slide-01.jpg?v=1784282511" fetchpriority="high">
<style>
  * { box-sizing: border-box; }

  @font-face {
    font-family: 'SJ Helvetica';
    src: url('https://cdn.shopify.com/s/files/1/0576/7705/4136/files/SJHelvetica-Roman.otf?v=1710498034') format('opentype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0a0a0a;
    overflow: hidden;
    font-family: 'SJ Helvetica', -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100dvh;
    isolation: isolate;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0;
    transition: opacity 1.4s ease;
    will-change: opacity;
  }

  .slide.active {
    opacity: 1;
    z-index: 1;
  }

  .logo-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(150px, 32vw);
    z-index: 5;
    pointer-events: none;
  }

  .logo-overlay img {
    width: 100%;
    height: auto;
    display: block;
  }

  footer {
    position: absolute;
    left: 0;
    bottom: 0;
    padding: 20px 28px;
    font-size: 13px;
    letter-spacing: 0.02em;
    color: #ffffff;
    text-align: left;
    z-index: 4;
    transition: color 0.6s ease;
  }

  footer.on-light {
    color: #0a0a0a;
  }

  footer.on-light a {
    color: #0a0a0a;
  }

  footer div {
    line-height: 1.6;
  }

  footer a {
    color: #ffffff;
    text-decoration: none;
  }

  footer a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

  <div class="stage" id="stage">

    <div class="logo-overlay" id="logoOverlay">
      <img id="logoImg" src="https://cdn.shopify.com/s/files/1/0576/7705/4136/files/FONDAZIONE_web_black.png?v=1784283359" alt="Fondazione Slam Jam">
    </div>

    <footer id="siteFooter">
      <div><a href="https://instagram.com/fondazioneslamjam" target="_blank" rel="noopener">@FONDAZIONESLAMJAM</a></div>
      <div><a href="mailto:info@fondazioneslamjam.org">INFO@FONDAZIONESLAMJAM.ORG</a></div>
    </footer>

  </div>

  <script>
    const images = [
      "https://cdn.shopify.com/s/files/1/0576/7705/4136/files/slide-01.jpg?v=1784282511",
      "https://cdn.shopify.com/s/files/1/0576/7705/4136/files/slide-02.jpg?v=1784282511",
      "https://cdn.shopify.com/s/files/1/0576/7705/4136/files/slide-03.jpg?v=1784282511",
      "https://cdn.shopify.com/s/files/1/0576/7705/4136/files/slide-04.jpg?v=1784282511",
      "https://cdn.shopify.com/s/files/1/0576/7705/4136/files/slide-05.jpg?v=1784282511",
      "https://cdn.shopify.com/s/files/1/0576/7705/4136/files/slide-06.jpg?v=1784282511",
      "https://cdn.shopify.com/s/files/1/0576/7705/4136/files/slide-07.jpg?v=1784282511",
      "https://cdn.shopify.com/s/files/1/0576/7705/4136/files/slide-08.jpg?v=1784282511",
      "https://cdn.shopify.com/s/files/1/0576/7705/4136/files/slide-09.jpg?v=1784282511"
    ];

    const LOGO_WHITE = "https://cdn.shopify.com/s/files/1/0576/7705/4136/files/FONDAZIONE_web_white.png?v=1784283359";
    const LOGO_BLACK = "https://cdn.shopify.com/s/files/1/0576/7705/4136/files/FONDAZIONE_web_black.png?v=1784283359";

    const stage = document.getElementById('stage');
    const logoImg = document.getElementById('logoImg');
    const siteFooter = document.getElementById('siteFooter');
    const slides = [];
    const isDarkBehind = new Array(images.length).fill(false);

    images.forEach((url, i) => {
      const div = document.createElement('div');
      div.className = 'slide' + (i === 0 ? ' active' : '');
      div.style.backgroundImage = `url('${url}')`;
      stage.insertBefore(div, stage.firstChild);
      slides.push(div);
    });

    // Analizza la luminosità della zona centrale di ogni foto (dove sta il logo)
    // per decidere se il logo deve essere scuro o invertito in chiaro.
    function analyzeBrightness(url) {
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          try {
            const size = 40;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            // ritaglio centrale simile a background-size: cover
            const ratio = Math.max(size / img.width, size / img.height);
            const w = img.width * ratio;
            const h = img.height * ratio;
            const x = (size - w) / 2;
            const y = (size - h) / 2;
            ctx.drawImage(img, x, y, w, h);

            const data = ctx.getImageData(0, 0, size, size).data;
            let total = 0;
            for (let p = 0; p < data.length; p += 4) {
              total += 0.299 * data[p] + 0.587 * data[p + 1] + 0.114 * data[p + 2];
            }
            const avg = total / (data.length / 4);
            resolve(avg < 130); // true = zona scura
          } catch (e) {
            resolve(false); // fallback: se il canvas fallisce (es. CORS), non invertire
          }
        };
        img.onerror = () => resolve(false);
        img.src = url;
      });
    }

    Promise.all(images.map(analyzeBrightness)).then((results) => {
      results.forEach((dark, i) => { isDarkBehind[i] = dark; });
      updateLogo(0);
    });

    function updateLogo(index) {
      const dark = isDarkBehind[index];
      // sfondo scuro -> logo bianco per contrasto, e viceversa
      logoImg.src = dark ? LOGO_WHITE : LOGO_BLACK;
      // il testo segue lo stesso stato del logo: bianco su scuro, nero su chiaro
      siteFooter.classList.toggle('on-light', !dark);
    }

    // preload di tutte le immagini in background, senza bloccare il primo render
    images.forEach(url => { const im = new Image(); im.src = url; });

    let current = 0;
    const INTERVAL = 5000;

    setInterval(() => {
      const next = (current + 1) % slides.length;
      slides[next].classList.add('active');
      slides[current].classList.remove('active');
      current = next;
      updateLogo(current);
    }, INTERVAL);
  </script>

</body>
</html>
